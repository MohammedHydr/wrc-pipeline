[mypy]
python_version = 3.12
; the Scrapy project lives under scraper/ and is imported as `wrc_scraper`
; (same name Scrapy uses at runtime — see tests/conftest.py)
mypy_path = scraper

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-scrapy.*]
ignore_missing_imports = True

[mypy-itemadapter.*]
ignore_missing_imports = True
